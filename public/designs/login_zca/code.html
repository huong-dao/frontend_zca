<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign in to ZCA - Project ZCA</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e6e8ea",
                        "on-primary-container": "#eeefff",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#ffdbcd",
                        "on-secondary-fixed": "#001c3b",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-surface": "#191c1e",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#0053db",
                        "surface": "#f7f9fb",
                        "tertiary-fixed-dim": "#ffb596",
                        "secondary-fixed-dim": "#adc8f5",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e0e3e5",
                        "on-primary-fixed": "#00174b",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-tertiary-fixed": "#360f00",
                        "primary-fixed": "#dbe1ff",
                        "surface-container": "#eceef0",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-secondary-container": "#3e5980",
                        "surface-container-highest": "#e0e3e5",
                        "tertiary": "#943700",
                        "primary": "#004ac6",
                        "on-tertiary-container": "#ffede6",
                        "surface-bright": "#f7f9fb",
                        "on-secondary-fixed-variant": "#2d486d",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#2d3133",
                        "on-error": "#ffffff",
                        "inverse-primary": "#b4c5ff",
                        "surface-container-low": "#f2f4f6",
                        "background": "#f7f9fb",
                        "error": "#ba1a1a",
                        "outline": "#737686",
                        "secondary-fixed": "#d5e3ff",
                        "on-background": "#191c1e",
                        "outline-variant": "#c3c6d7",
                        "secondary-container": "#b5d0fd",
                        "inverse-on-surface": "#eff1f3",
                        "surface-dim": "#d8dadc",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#2563eb",
                        "tertiary-container": "#bc4800",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#434655",
                        "secondary": "#455f87"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f7f9fb 0%, #dbe1ff 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed">
<main class="w-full max-w-[440px] animate-in fade-in duration-700">
<!-- Logo and Branding Header -->
<div class="flex flex-col items-center mb-10">
<div class="mb-6 h-14 w-14 rounded-xl bg-gradient-to-br from-primary to-primary-container flex items-center justify-center text-white shadow-xl shadow-primary/20">
<span class="material-symbols-outlined text-3xl" data-icon="command_key">keyboard_command_key</span>
</div>
<h1 class="text-3xl font-black text-on-surface tracking-tight mb-2">Đăng nhập hệ thống ZCA</h1>
<p class="text-on-surface-variant body-md">Nhập thông tin đăng nhập để truy cập hệ thống</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-10 shadow-[0_8px_30px_rgba(25,28,30,0.06)] ring-1 ring-outline-variant/15">
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[0.6875rem] font-semibold text-on-surface-variant uppercase tracking-widest" for="email">
                        Email
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-0 rounded-lg text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary-fixed focus:bg-surface-container-lowest transition-all" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-[0.6875rem] font-semibold text-on-surface-variant uppercase tracking-widest" for="password">
                            Mật khẩu
                        </label>
<a class="text-[0.6875rem] font-semibold text-primary hover:text-primary-container transition-colors tracking-tight" href="#">
                            Quên mật khẩu?
                        </a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-3.5 bg-surface-container-low border-0 rounded-lg text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary-fixed focus:bg-surface-container-lowest transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary-container" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-3 block text-sm text-on-surface-variant" for="remember-me">
                        Giữ đăng nhập trong 30 ngày
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-white font-semibold rounded-lg shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                    Đăng nhập
                    <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Social Login Divider -->
<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-tighter">
<span class="bg-surface-container-lowest px-4 text-outline">Hoặc tiếp tục với</span>
</div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-1">
<button class="flex items-center justify-center px-4 py-2.5 bg-surface-container-low hover:bg-surface-container-high rounded-lg transition-colors group">
<img alt="Google Logo" class="h-5 w-5 mr-2 opacity-80 group-hover:opacity-100 transition-opacity" data-alt="Official Google G-logo with minimalist flat design on white background" src="https://www.gstatic.com/marketing-cms/assets/images/d5/dc/cfe9ce8b4425b410b49b7f2dd3f3/g.webp=s48-fcrop64=1,00000000ffffffff-rw"/>
<span class="text-sm font-medium text-on-secondary-container">Google</span>
</button>
</div>
</div>
<!-- Footer Help -->
<p class="mt-10 text-center text-on-surface-variant body-md">
            Không có tài khoản? 
            <a class="font-bold text-primary hover:underline underline-offset-4 decoration-2" href="#">Liên hệ Admin</a>
</p>
<!-- Aesthetic Background Elements (Abstract) -->
<div class="fixed top-20 -left-20 w-96 h-96 bg-primary/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>
<div class="fixed bottom-20 -right-20 w-96 h-96 bg-secondary/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>
</main>
</body></html>
